  - generic [ref=e255]:
    - heading "svg icon DummyJSON - Docs" [level=1] [ref=e256]:
      - img "svg icon" [ref=e257]
      - text: DummyJSON - Docs
    - paragraph [ref=e258]:
      - text: DummyJSON can be used with any type of front end project that needs products, carts, users, todos or any dummy data in JSON format.
      - text: You can use examples below to check how DummyJSON works.
      - text: Feel free to enjoy it in your awesome projects!
    - generic [ref=e259]:
      - link "Test Route" [ref=e260] [cursor=pointer]:
        - /url: "#intro-test"
      - paragraph [ref=e261]: See if your internet is working 😉
      - code [ref=e263]: "// Could be GET or POST/PUT/PATCH/DELETE fetch('https://dummyjson.com/test') .then(res => res.json()) .then(console.log); /* { status: 'ok', method: 'GET' } */"
    - generic [ref=e264]:
      - link "Limiting Resources" [ref=e265] [cursor=pointer]:
        - /url: "#intro-limit"
      - paragraph [ref=e266]:
        - text: All the resources can be used with query params to achieve pagination and get limited data.
        - generic [ref=e267]: limit=0
        - text: clears the limit and you get all items
      - code [ref=e269]: fetch('https://dummyjson.com/RESOURCE/?limit=10&skip=5&select=key1,key2,key3');
      - paragraph [ref=e270]: It can be comma separated, OR, you can use multiple select query params to get multiple keys.
      - code [ref=e272]: fetch('https://dummyjson.com/RESOURCE/?limit=10&skip=5&select=key1&select=key2&select=key3');
    - generic [ref=e273]:
      - link "Delay Responses" [ref=e274] [cursor=pointer]:
        - /url: "#intro-delay"
      - paragraph [ref=e275]: You can simulate a delay in responses using the delay param, delay can be any number between 0 and 5000 milliseconds
      - code [ref=e277]: fetch('https://dummyjson.com/RESOURCE/?delay=1000');
    - generic [ref=e278]:
      - link "Authorizing Resources" [ref=e279] [cursor=pointer]:
        - /url: "#intro-auth"
      - paragraph [ref=e280]: All resources can be accessed via an access token to test as a logged-in user.
      - paragraph [ref=e281]: Go to auth module and generate an auth access token to get data as an authorized user
      - code [ref=e283]: "/* providing access token in bearer */ fetch('https://dummyjson.com/auth/RESOURCE', { method: 'GET', /* or POST/PUT/PATCH/DELETE */ headers: { 'Authorization': 'Bearer /* YOUR_ACCESS_TOKEN_HERE */', 'Content-Type': 'application/json' }, }) .then(res => res.json()) .then(console.log);"
    - generic [ref=e284]:
      - link "IP Address" [ref=e285] [cursor=pointer]:
        - /url: "#intro-ip"
      - paragraph [ref=e286]: Get the IP address of the client.
      - code [ref=e288]: "// GET fetch('https://dummyjson.com/ip') .then(res => res.json()) .then(console.log); /* { ip: '127.0.0.1', userAgent: 'Mozilla/5.0 ...' } */"
