      - paragraph [ref=e292]:
        - text: Pass
        - generic [ref=e293]: "\"merge: true\""
        - text: to include old products when updating
      - paragraph [ref=e294]:
        - text: You can provide a
        - generic [ref=e295]: userId
        - text: and array of products as objects, containing
        - generic [ref=e296]: productId
        - text: "&"
        - generic [ref=e297]: quantity
      - code [ref=e299]: "/* adding products in cart with id 1 */ fetch('https://dummyjson.com/carts/1', { method: 'PUT', /* or PATCH */ headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ merge: true, // this will include existing products in the cart products: [ { id: 1, quantity: 1, }, ] }) }) .then(res => res.json()) .then(console.log);"
      - button "Show Output" [ref=e300] [cursor=pointer]
